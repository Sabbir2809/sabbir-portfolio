name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------
  # 🧪 TEST JOB
  # ---------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      # 1. Repo থেকে code নিয়ে আসা
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node.js setup করা
      - name: Setup Node.js with Cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      # 3. Dependencies install
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 4. Test run (এখন dummy রাখা হয়েছে)
      - name: Run Tests
        run: echo "No tests yet later i can use `yarn test`"

  # ---------------------------
  # 🏗️ BUILD JOB
  # ---------------------------
  build:
    runs-on: ubuntu-latest
    needs: test # test pass হলে build run করবে

    steps:
      # 1. Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Node setup
      - name: Setup Node.js with Cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      # 3. Install deps
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 4. Build React app
      - name: Build Application
        run: yarn build # React build → dist / build folder তৈরি হবে

  # ---------------------------
  # 🚀 DEPLOY JOB
  # ---------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build # build success হলে deploy run

    steps:
      # Dummy deploy (শুধু শেখার জন্য)
      - name: Deploy Step
        run: echo "Deploy step coming soon 🚀"
