name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js (Yarn)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      # 3. Enable Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Install dependencies
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 5. Build app
      - name: Build App
        run: yarn build

  deploy:
    runs-on: ubuntu-latest
    needs: build # 👈 IMPORTANT: build must succeed first
    if: github.ref == 'refs/heads/main'

    steps:
      # 1. Checkout code again
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"

      # 3. Enable Yarn
      - name: Enable Corepack
        run: corepack enable

      # 4. Install dependencies
      - name: Install Dependencies
        run: yarn install --frozen-lockfile

      # 5. Build again (safe for deployment)
      - name: Build App
        run: yarn build

      # 6. Install Netlify CLI
      - name: Install Netlify CLI
        run: yarn global add netlify-cli

      # 7. Deploy to Netlify
      - name: Deploy to Netlify
        run: netlify deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
